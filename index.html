<script>
    // LÓGICA DE SENHA
    function verificarSenha(event) {
      if (event) event.preventDefault();
      const senha = document.getElementById("inputSenha").value;
      if (senha === "ciaan1955") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("conteudoPortaria").style.display = "block";
        
        // Pequeno delay para garantir que o DOM do container esteja totalmente visível
        setTimeout(() => {
          iniciarCamera();
        }, 100);
      } else {
        alert("Senha incorreta!");
        document.getElementById("inputSenha").value = "";
      }
    }

    // --- CONFIGURAÇÕES GLOBAIS ---
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUd_fn2DRczQRQylMCxd7XWeNF7BJxPqQyQDLNMHeKAdWZgVmSq20FjqZTjOkNy-dd/exec";
    const audioOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const audioErro = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    let html5QrcodeScanner = null;  // será instanciado depois que o #preview existir
    let ultimoQrLido = "";
    const config = { fps: 5, qrbox: { width: 220, height: 220 } };

    // Função que realmente inicia a câmera com tratamento de erro
    function iniciarCamera() {
      // Verifica se o navegador suporta getUserMedia
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        exibirAlerta("❌ Seu navegador não suporta acesso à câmera.", "bloqueado");
        return;
      }

      // Verifica se a página está em contexto seguro (HTTPS ou localhost)
      const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (!isSecure) {
        exibirAlerta("⚠️ Para usar a câmera, acesse via HTTPS ou localhost. (Arquivo local não funciona)", "alerta");
        return;
      }

      // Se já existe um scanner e está rodando, não recria
      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        console.log("Scanner já está ativo.");
        return;
      }

      // Cria nova instância (garante que o elemento #preview existe)
      const previewElement = document.getElementById("preview");
      if (!previewElement) {
        exibirAlerta("Erro interno: elemento #preview não encontrado.", "bloqueado");
        return;
      }

      // Limpa conteúdo anterior (caso tenha ficado algum resíduo)
      previewElement.innerHTML = "";
      
      html5QrcodeScanner = new Html5Qrcode("preview");

      // Tenta iniciar com a câmera traseira
      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
      ).then(() => {
        console.log("Câmera iniciada com sucesso!");
        exibirAlerta("📷 Câmera ativa. Aponte para o QR Code.", "liberado");
        // Limpa qualquer mensagem de erro anterior
        setTimeout(() => {
          const box = document.getElementById("boxAlerta");
          if (box && box.style.display !== "none" && box.innerText.includes("Câmera ativa")) {
            box.style.display = "none";
          }
        }, 3000);
      }).catch(err => {
        console.error("Erro ao iniciar câmera traseira:", err);
        // Tenta listar as câmeras disponíveis como fallback
        Html5Qrcode.getCameras().then(cameras => {
          if (cameras && cameras.length > 0) {
            // Pega a primeira câmera (geralmente frontal) ou a última (traseira)
            const cameraId = cameras[cameras.length - 1].id;
            return html5QrcodeScanner.start(cameraId, config, onScanSuccess);
          } else {
            throw new Error("Nenhuma câmera encontrada.");
          }
        }).then(() => {
          console.log("Câmera fallback iniciada.");
          exibirAlerta("📷 Câmera ativa (fallback).", "liberado");
        }).catch(fallbackErr => {
          console.error("Falha total ao acessar câmera:", fallbackErr);
          let mensagem = "Não foi possível acessar a câmera. Verifique:";
          mensagem += "<br>1. Permissão concedida (clique no ícone de cadeado ao lado da URL)";
          mensagem += "<br>2. Execute em HTTPS ou localhost (não em arquivo local)";
          mensagem += "<br>3. Nenhum outro app está usando a câmera";
          exibirAlerta(mensagem, "bloqueado");
        });
      });
    }

    function onScanSuccess(decodedText) {
      if (decodedText && decodedText !== ultimoQrLido) {
        ultimoQrLido = decodedText;
        processarLeitura(decodedText);
      }
    }

    function processarLeitura(idConvidado) {
      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        html5QrcodeScanner.pause(true);
      }
      if (navigator.vibrate) navigator.vibrate(200);

      document.getElementById("loading").style.display = "block";
      document.getElementById("boxAlerta").style.display = "none";
      document.getElementById("dadosConvidado").style.display = "none";

      fetch(GOOGLE_WEB_APP_URL, {
        method: "POST",
        body: new URLSearchParams({ acao: "consultar", idConvidado: idConvidado })
      })
      .then(r => r.json())
      .then(res => {
        document.getElementById("loading").style.display = "none";
        if (!res.sucesso) {
          audioErro.play();
          exibirAlerta(res.msg, "bloqueado");
          liberarScanner();
          return;
        }
        document.getElementById("dNome").innerText = res.nome;
        document.getElementById("dVeiculo").innerText = res.veiculo;
        document.getElementById("dAluno").innerText = res.aluno;
        document.getElementById("dStatus").innerText = res.status;
        document.getElementById("dadosConvidado").style.display = "block";

        const btn = document.getElementById("btnLiberar");
        if (res.status !== "NÃO ENTROU") {
          audioErro.play();
          btn.style.display = "none";
          exibirAlerta("⚠️ CONVIDADO JÁ ENTROU", "alerta");
          liberarScanner();
          return;
        }

        audioOk.play();
        btn.style.display = "block";
        btn.disabled = false;
        btn.innerText = "LIBERAR ACESSO";
        exibirAlerta("✓ APTO PARA ENTRADA", "liberado");

        btn.onclick = async function() {
          btn.disabled = true;
          btn.innerText = "PROCESSANDO...";
          try {
            const response = await fetch(GOOGLE_WEB_APP_URL, {
              method: "POST",
              body: new URLSearchParams({ acao: "liberar", idConvidado: idConvidado })
            });
            const retorno = await response.json();
            if (retorno.sucesso) {
              audioOk.play();
              exibirAlerta("✓ ACESSO LIBERADO", "liberado");
            } else {
              audioErro.play();
              exibirAlerta(retorno.msg, "bloqueado");
            }
          } catch (e) {
            audioErro.play();
            exibirAlerta("Erro de conexão!", "bloqueado");
          }
          setTimeout(() => {
            document.getElementById("dadosConvidado").style.display = "none";
            document.getElementById("boxAlerta").style.display = "none";
            if (html5QrcodeScanner && html5QrcodeScanner.isScanning === false) {
              html5QrcodeScanner.resume();
            }
            ultimoQrLido = "";
          }, 3000);
        };
      })
      .catch(() => {
        document.getElementById("loading").style.display = "none";
        audioErro.play();
        exibirAlerta("Erro de comunicação com o servidor.", "bloqueado");
        liberarScanner();
      });
    }

    function exibirAlerta(texto, classe) {
      const box = document.getElementById("boxAlerta");
      box.innerHTML = texto;
      box.className = "status-alerta " + classe;
      box.style.display = "block";
    }

    function liberarScanner() {
      setTimeout(() => {
        document.getElementById("dadosConvidado").style.display = "none";
        document.getElementById("boxAlerta").style.display = "none";
        if (html5QrcodeScanner && html5QrcodeScanner.isScanning === false) {
          html5QrcodeScanner.resume();
        }
        ultimoQrLido = "";
      }, 4000);
    }
    
    // (Opcional) Botão para reiniciar a câmera manualmente, caso dê erro
    function reiniciarCamera() {
      if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
        html5QrcodeScanner.stop().then(() => {
          iniciarCamera();
        }).catch(() => iniciarCamera());
      } else {
        iniciarCamera();
      }
    }
    
    // Adiciona um botão invisível de ajuda (opcional) – você pode chamar reiniciarCamera() pelo console se necessário
    console.log("Para reiniciar a câmera manualmente, digite reiniciarCamera() no console.");
  </script>
