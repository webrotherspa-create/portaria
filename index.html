<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Acesso - Formatura</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
    .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
    h2 { color: #1a365d; margin-top: 0; text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    
    .form-group { margin-bottom: 15px; text-align: left; }
    label { display: block; font-weight: bold; margin-bottom: 5px; color: #4a5568; font-size: 14px; }
    input[type="text"], input[type="tel"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
    input:focus { border-color: #3182ce; outline: none; }
    
    .checkbox-group { display: flex; align-items: center; margin: 15px 0; }
    .checkbox-group input { margin-right: 10px; width: 18px; height: 18px; }
    .veiculo-section { display: none; background: #f7fafc; padding: 15px; border-radius: 6px; border: 1px dashed #cbd5e0; margin-bottom: 15px; }
    
    button { width: 100%; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .btn-principal { background: #1a365d; }
    .btn-principal:hover { background: #2b6cb0; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    
    .error-msg { color: #e53e3e; font-size: 13px; margin-top: 5px; display: none; font-weight: bold; }
    .portaria-link-box { text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
    .portaria-link { color: #718096; font-size: 13px; text-decoration: none; font-weight: 500; }
    .portaria-link:hover { color: #1a365d; text-decoration: underline; }
    .tela-oculta { display: none; }
  </style>
</head>
<body>

  <div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1a365d; z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:8px; text-align:center; width:90%; max-width:300px;">
      <h3 style="color:#1a365d; margin-top:0;">Acesso Restrito</h3>
      <input type="password" id="inputSenha" placeholder="Digite a senha" style="margin-bottom:10px;">
      <button onclick="verificarSenha()" style="background:#2b6cb0;">Entrar</button>
    </div>
  </div>

  <div class="container" id="boxFormulario" style="display:none;">
    <h2>Acesso à Base - Formatura</h2>
    <form id="formCadastro" onsubmit="enviarFormulario(event)">
      <div class="form-group">
        <label for="codigoAluno">Código Interno do Aluno Formando</label>
        <input type="text" id="codigoAluno" required placeholder="Ex: 4502">
      </div>
      <div class="form-group">
        <label for="nomeConvidado">Nome Completo do Convidado</label>
        <input type="text" id="nomeConvidado" required placeholder="Nome sem abreviações" oninput="this.value = this.value.toUpperCase()">
      </div>
      <div class="form-group">
        <label for="cpf">CPF do Convidado</label>
        <input type="tel" id="cpf" required placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
        <div class="error-msg" id="cpfErro">CPF inválido. Insira um número real.</div>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="temVeiculo" onchange="toggleVeiculo(this)">
        <label for="temVeiculo">Vou entrar com Veículo Próprio</label>
      </div>
      <div class="veiculo-section" id="secaoVeiculo">
        <div class="form-group">
          <label for="veiculoModelo">Modelo do Veículo</label>
          <input type="text" id="veiculoModelo" placeholder="Ex: HONDA CIVIC" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="form-group">
          <label for="veiculoCor">Cor do Veículo</label>
          <input type="text" id="veiculoCor" placeholder="Ex: PRETO" oninput="this.value = this.value.toUpperCase()">
        </div>
        <div class="form-group">
          <label for="veiculoPlaca">Placa do Veículo</label>
          <input type="text" id="veiculoPlaca" placeholder="Ex: ABC1D23" maxlength="8" oninput="this.value = this.value.toUpperCase()">
        </div>
      </div>
      <button type="submit" id="btnEnviar" class="btn-principal">Gerar Cartão de Confirmação</button>
    </form>
    
    <div class="container" id="boxConsultaFormando" style="margin-top: 20px; padding: 20px 0; border-top: 1px solid #e2e8f0; box-shadow:none;">
      <h4 style="color:#1a365d; margin-top:0;">Quer ver seus convidados, formando?</h4>
      <input type="text" id="nipConsulta" placeholder="Digite seu NIP (00.0000.00)" oninput="mascaraNIP(this)">
      <button onclick="buscarPorNip()" style="background:#2b6cb0; margin-top:10px;">Consultar Convidados</button>
      <div id="resultadoNip" style="margin-top:15px; font-size: 14px; text-align: left;"></div>
    </div>

    <div class="portaria-link-box">
      <a href="https://webrotherspa-create.github.io/portaria/" target="_blank" class="portaria-link">🔒 Área de Serviço (Conferente Portaria)</a>
    </div>
  </div>

  <script>
    function verificarSenha() {
      const senha = document.getElementById("inputSenha").value;
      if (senha === "ciaan1955") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("boxFormulario").style.display = "block";
      } else {
        alert("Senha incorreta!");
        document.getElementById("inputSenha").value = "";
      }
    }

    function toggleVeiculo(chk) {
      document.getElementById("secaoVeiculo").style.display = chk.checked ? "block" : "none";
    }

    function mascaraCPF(i) {
      let v = i.value.replace(/\D/g, "");
      if (v.length <= 11) {
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      }
      i.value = v;
    }

    function mascaraNIP(i) {
      let v = i.value.replace(/\D/g, "");
      if (v.length > 2) v = v.replace(/^(\d{2})(\d)/, "$1.$2");
      if (v.length > 6) v = v.replace(/\.(\d{4})(\d)/, ".$1.$2");
      i.value = v;
    }

    function buscarPorNip() {
      const nip = document.getElementById("nipConsulta").value;
      const divRes = document.getElementById("resultadoNip");
      divRes.innerHTML = "Consultando...";
      
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res.sucesso) {
            divRes.innerHTML = "<span style='color:red;'>Nenhum convidado encontrado.</span>";
            return;
          }
          if (res.ehGerente) {
            divRes.innerHTML = "Acesso Gerente confirmado. Abrindo lista...";
            google.script.run.withSuccessHandler(function(url) {
              window.open(url + "?page=gerente", "_blank");
            }).getScriptUrl();
          } else {
            let html = "<ul style='padding-left:20px; margin-top:10px;'>";
            res.dados.forEach(d => {
              html += `<li><strong>${d.convidado}</strong> - <span>${d.status}</span></li>`;
            });
            html += "</ul>";
            divRes.innerHTML = html;
          }
        })
        .buscarConvidadosPorNip(nip);
    }
    
    // ... (restante das funções que você já tinha: enviarFormulario, validarCPF, etc.)
  </script>
</body>
</html>
