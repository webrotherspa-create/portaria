<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Portaria Militar</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a202c; color: white; margin: 0; padding: 15px; text-align: center; }
    .container { max-width: 500px; margin: 20px auto; background: #2d3748; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; color: #63b3ed; border-bottom: 1px solid #4a5568; padding-bottom: 10px; }
    #preview { width: 100%; max-width: 320px; min-height: 240px; background: black; border-radius: 8px; margin: 0 auto 15px auto; overflow: hidden; border: 3px solid #63b3ed; }
    .status-alerta { font-weight: bold; padding: 12px; border-radius: 6px; margin-top: 15px; display: none; font-size: 16px; }
    .liberado { background: #2f855a; border: 1px solid #48bb78; color: white; }
    .bloqueado { background: #9b2c2c; border: 1px solid #f56565; color: white; }
    .alerta { background: #975a16; border: 1px solid #ecc94b; color: white; }
    .loader { display: none; color: #cbd5e0; margin-top: 10px; font-style: italic; }
    .dados-box { display: none; background: #1f2937; margin-top: 15px; padding: 18px; border-radius: 8px; text-align: left; border: 1px solid #4a5568; }
    .dados-box p { margin: 10px 0; line-height: 1.4; }
    .dados-box strong { color: #90cdf4; }
    #btnLiberar { width: 100%; background: #2f855a; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    #btnLiberar:hover { background: #276749; }
    #btnLiberar:disabled { background: #718096; cursor: not-allowed; }
  </style>
</head>
<body>

  <div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1a202c; z-index:9999; display:flex; justify-content:center; align-items:center;">
    <div class="container" style="background:white; color:#333; text-align:center;">
      <h3 style="color:#1a365d;">Acesso à Portaria</h3>
      <input type="password" id="inputSenha" placeholder="Digite a senha" style="width:90%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
      <button type="button" onclick="verificarSenha(event)" style="background:#2f855a; color:white; border:none; padding:12px; width:100%; cursor:pointer; border-radius:4px;">Entrar</button>
    </div>
  </div>

  <div class="container" id="conteudoPortaria" style="display:none;">
    <h2>PORTARIA MILITAR</h2>
    <div id="preview"></div>
    <div style="color:#a0aec0; font-size:13px;">Aponte para o QR Code do Convidado</div>
    <div class="loader" id="loading">Verificando credenciais...</div>
    <div class="status-alerta" id="boxAlerta"></div>

    <div class="dados-box" id="dadosConvidado">
      <p><strong>CONVIDADO:</strong><br><span id="dNome"></span></p>
      <p><strong>VEÍCULO:</strong><br><span id="dVeiculo"></span></p>
      <p><strong>FORMANDO RESPONSÁVEL:</strong><br><span id="dAluno"></span></p>
      <p><strong>STATUS:</strong><br><span id="dStatus"></span></p>
      <button id="btnLiberar">LIBERAR ACESSO</button>
    </div>
  </div>

  <script>
    // LÓGICA DE SENHA
    function verificarSenha(event) {
      if (event) event.preventDefault();
      const senha = document.getElementById("inputSenha").value;
      if (senha === "ciaan1955") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("conteudoPortaria").style.display = "block";
      } else {
        alert("Senha incorreta!");
        document.getElementById("inputSenha").value = "";
      }
    }

    // --- SEU CÓDIGO ORIGINAL ABAIXO ---
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUd_fn2DRczQRQylMCxd7XWeNF7BJxPqQyQDLNMHeKAdWZgVmSq20FjqZTjOkNy-dd/exec";
    const audioOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const audioErro = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    let html5QrcodeScanner = new Html5Qrcode("preview");
    let ultimoQrLido = "";
    const config = { fps: 5, qrbox: { width: 220, height: 220 } };

    // Só inicia a câmera se a senha for liberada (chamada após login se necessário, mas aqui deixamos pronta)
    function iniciarCamera() {
      html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess).catch(err => {
        Html5Qrcode.getCameras().then(cameras => {
          if (cameras.length > 0) html5QrcodeScanner.start(cameras[cameras.length - 1].id, config, onScanSuccess);
          else alert("Erro ao acessar câmera.");
        });
      });
    }

    // Inicia a câmera automaticamente após o login (adicionei esta chamada na função verificarSenha se quiser)
    // Para simplificar, vou deixar a função iniciarCamera disponível.

    function onScanSuccess(decodedText) {
      if (decodedText && decodedText !== ultimoQrLido) {
        ultimoQrLido = decodedText;
        processarLeitura(decodedText);
      }
    }

    function processarLeitura(idConvidado) {
      html5QrcodeScanner.pause(true);
      if (navigator.vibrate) navigator.vibrate(200);

      document.getElementById("loading").style.display = "block";
      document.getElementById("boxAlerta").style.display = "none";
      document.getElementById("dadosConvidado").style.display = "none";

      fetch(GOOGLE_WEB_APP_URL, {
        method: "POST",
        body: new URLSearchParams({ acao: "consultar", idConvidado: idConvidado })
      })
      .then(r => r.json())
      .then(res => {
        document.getElementById("loading").style.display = "none";
        if (!res.sucesso) {
          audioErro.play();
          exibirAlerta(res.msg, "bloqueado");
          liberarScanner();
          return;
        }
        document.getElementById("dNome").innerText = res.nome;
        document.getElementById("dVeiculo").innerText = res.veiculo;
        document.getElementById("dAluno").innerText = res.aluno;
        document.getElementById("dStatus").innerText = res.status;
        document.getElementById("dadosConvidado").style.display = "block";

        const btn = document.getElementById("btnLiberar");
        if (res.status !== "NÃO ENTROU") {
          audioErro.play();
          btn.style.display = "none";
          exibirAlerta("⚠️ CONVIDADO JÁ ENTROU", "alerta");
          liberarScanner();
          return;
        }

        audioOk.play();
        btn.style.display = "block";
        btn.disabled = false;
        btn.innerText = "LIBERAR ACESSO";
        exibirAlerta("✓ APTO PARA ENTRADA", "liberado");

        btn.onclick = async function() {
          btn.disabled = true;
          btn.innerText = "PROCESSANDO...";
          try {
            const response = await fetch(GOOGLE_WEB_APP_URL, {
              method: "POST",
              body: new URLSearchParams({ acao: "liberar", idConvidado: idConvidado })
            });
            const retorno = await response.json();
            if (retorno.sucesso) {
              audioOk.play();
              exibirAlerta("✓ ACESSO LIBERADO", "liberado");
            } else {
              audioErro.play();
              exibirAlerta(retorno.msg, "bloqueado");
            }
          } catch (e) {
            audioErro.play();
            exibirAlerta("Erro de conexão!", "bloqueado");
          }
          setTimeout(() => {
            document.getElementById("dadosConvidado").style.display = "none";
            document.getElementById("boxAlerta").style.display = "none";
            html5QrcodeScanner.resume();
            ultimoQrLido = "";
          }, 3000);
        };
      })
      .catch(() => {
        document.getElementById("loading").style.display = "none";
        audioErro.play();
        exibirAlerta("Erro de comunicação com o servidor.", "bloqueado");
        liberarScanner();
      });
    }

    function exibirAlerta(texto, classe) {
      const box = document.getElementById("boxAlerta");
      box.innerHTML = texto;
      box.className = "status-alerta " + classe;
      box.style.display = "block";
    }

    function liberarScanner() {
      setTimeout(() => {
        document.getElementById("dadosConvidado").style.display = "none";
        document.getElementById("boxAlerta").style.display = "none";
        html5QrcodeScanner.resume();
        ultimoQrLido = "";
      }, 4000);
    }
  </script>
</body>
</html>
