<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Portaria - Militar</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a202c; color: white; margin: 0; padding: 15px; text-align: center; }
    .container { max-width: 500px; margin: 20px auto; background: #2d3748; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    h2 { margin-top: 0; color: #63b3ed; border-bottom: 1px solid #4a5568; padding-bottom: 10px; }
    #preview { width: 100%; max-width: 320px; min-height: 240px; background: black; border-radius: 6px; margin: 0 auto 15px auto; overflow: hidden; }
    .status-alerta { font-weight: bold; padding: 12px; border-radius: 4px; margin-top: 15px; display: none; font-size: 16px; }
    .liberado { background: #2f855a; border: 1px solid #48bb78; color: white; }
    .bloqueado { background: #9b2c2c; border: 1px solid #f56565; color: white; }
    .loader { display: none; color: #cbd5e0; margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <h2>PORTARIA MILITAR - SCANNER</h2>
    <div id="preview"></div>
    <div style="color: #a0aec0; font-size: 13px;">Aponte para o QR Code do Convidado</div>
    
    <div class="loader" id="loading">Verificando credenciais no Google Sheets...</div>
    <div class="status-alerta" id="boxAlerta"></div>
  </div>

  <script>
    // Link oficial da sua implantação corrigido e unificado
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUd_fn2DRczQRQylMCxd7XWeNF7BJxPqQyQDLNMHeKAdWZgVmSq20FjqZTjOkNy-dd/exec";

    let html5QrcodeScanner = new Html5Qrcode("preview");
    let ultimoQrLido = "";

    const config = { fps: 10, qrbox: { width: 220, height: 220 } };

    // Inicialização automática da câmera integrada
    html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
    .catch(err => {
      Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length > 0) {
          html5QrcodeScanner.start(cameras[cameras.length - 1].id, config, onScanSuccess);
        }
      }).catch(e => alert("Erro ao acessar hardware de vídeo: " + e));
    });

    function onScanSuccess(decodedText) {
      if(decodedText && decodedText !== ultimoQrLido) {
        ultimoQrLido = decodedText;
        processarLeitura(decodedText);
      }
    }

    function processarLeitura(idConvidado) {
      document.getElementById("boxAlerta").style.display = "none";
      document.getElementById("loading").style.display = "block";
      
      if(navigator.vibrate) { navigator.vibrate(100); }

      // Envia os dados como Form URL Encoded para permitir resposta em tempo real sem bloqueio de segurança
      fetch(GOOGLE_WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ "idConvidado": idConvidado })
      })
      .then(response => response.text())
      .then(textoResposta => {
        document.getElementById("loading").style.display = "none";
        
        // Verifica a mensagem devolvida pelo seu Código.gs
        if (textoResposta.includes("✓ LIBERADO")) {
          exibirAlerta(textoResposta, "liberado");
        } else {
          exibirAlerta(textoResposta, "bloqueado"); // Trata avisos de "Já lido" ou "Inválido"
        }
        
        // Mantém a resposta na tela por 5 segundos antes de liberar o scanner para o próximo QR Code
        setTimeout(() => { 
          ultimoQrLido = ""; 
          document.getElementById("boxAlerta").style.display = "none";
        }, 5000);
      })
      .catch(err => {
        document.getElementById("loading").style.display = "none";
        exibirAlerta("Erro de comunicação com o servidor de dados.", "bloqueado");
        setTimeout(() => { ultimoQrLido = ""; }, 5000);
      });
    }

    function exibirAlerta(texto, classe) {
      const box = document.getElementById("boxAlerta");
      box.innerHTML = texto;
      box.className = "status-alerta " + classe;
      box.style.display = "block";
    }
  </script>
</body>
</html>
